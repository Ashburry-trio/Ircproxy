name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install tools
        run: |
          pip install black ruff

      - name: Check formatting (Black)
        run: |
          black --check .

      - name: Lint (Ruff)
        run: |
          ruff .
